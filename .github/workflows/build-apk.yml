name: Build APK with Cache Cleanup

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.0
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Clean Metro cache
        run: pnpm clean-cache:full
      
      - name: Check TypeScript
        run: pnpm check
      
      - name: Lint code
        run: pnpm lint
      
      - name: Run tests
        run: pnpm test
      
      - name: Build server
        run: pnpm build
      
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      
      - name: Build APK
        run: eas build --platform android --local --non-interactive
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: worktime-apk
          path: dist/
          retention-days: 30
      
      - name: Notify on success
        if: success()
        run: echo "✓ APK build completed successfully"
      
      - name: Notify on failure
        if: failure()
        run: echo "✗ APK build failed"
